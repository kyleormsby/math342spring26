<div class="para logical">
<div class="para">For a point <span class="process-math">\(b\in Y\text{,}\)</span> the <dfn class="terminology">cone operator</dfn> <span class="process-math">\(b\colon LC_n(Y)\to LC_{n+1}(Y)\)</span> is defined on generators by</div>
<div class="displaymath process-math">
\begin{equation*}
b\cdot[w_0,\ldots,w_n] := [b,w_0,\ldots,w_n].
\end{equation*}
</div>
